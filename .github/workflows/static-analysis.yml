name: Testes (Unitários e Integração)

on:
  pull_request:
    types: [opened, reopened]
    branches:
      - "feature/*"
      - "bugfix/*"
      - "docs/*"
      - "refactor/*"
      - "develop"
      - "master"
  push:
    branches:
      - "feature/*"
      - "bugfix/*"
      - "docs/*"
      - "refactor/*"
      - "develop"
      - "master"
  workflow_dispatch: {}
  
# Evita execuções concorrentes desnecessárias para o mesmo branch/PR
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: companyman

jobs:

  unit-tests:
    name: Testes unitários (JUnit 5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Executar testes unitários (mvn test)
        run: mvn -B -ntp test

      - name: Publicar relatório de testes unitários
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultado dos testes unitários
          path: 'companyman/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload dos relatórios (surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: companyman/target/surefire-reports/
          retention-days: 15
          if-no-files-found: warn

