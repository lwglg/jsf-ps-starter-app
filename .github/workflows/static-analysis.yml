name: Java CI Pipeline

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'companyman/**'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'companyman/**'

jobs:
  build-and-test:
    name: Build, Unit, and Integration Tests
    runs-on: ubuntu-latest

    steps:
    # 1. git pull da projeto
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Configura o ambiente do JDK com caching built-in de dependências
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache-dependency-path: 'companyman/pom.xml'
        cache: 'maven'

    # 3. Limpa o ambiente e roda todos os testes (Surefire + Failsafe)
    - name: Execute Tests via Maven
      run: ./mvnw clean verify --batch-mode

    # 4. Save and publish the generated test reports
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always() # Mesmo que o teste quebre, publica os resultados
      with:
        name: test-reports
        path: |
          **/target/surefire-reports/*.xml
          **/target/failsafe-reports/*.xml
