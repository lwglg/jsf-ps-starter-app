name: Testes (Unitários e Integração)

on:
  push:
    branches: [ "develop", "master" ]
  pull_request:
    branches: [ "develop", "master" ]
  workflow_dispatch: {}

# Evita execuções concorrentes desnecessárias para o mesmo branch/PR
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:

  unit-tests:
    name: Testes unitários (JUnit 5)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Executar testes unitários (mvn test)
        run: mvn -B -ntp test

      - name: Publicar relatório de testes unitários
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultado dos testes unitários
          path: 'app/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload dos relatórios (surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: app/target/surefire-reports/
          retention-days: 15
          if-no-files-found: warn

  integration-tests:
    name: Testes de integração (Testcontainers + PostgreSQL)
    runs-on: ubuntu-latest
    # O runner ubuntu-latest já provê o Docker Engine necessário para o Testcontainers.
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verificar disponibilidade do Docker
        run: docker version

      - name: Executar testes de integração (mvn verify)
        run: mvn -B -ntp verify
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Publicar relatório de testes de integração
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultado dos testes de integração
          path: 'app/target/failsafe-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Upload dos relatórios (failsafe)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: app/target/failsafe-reports/
          retention-days: 15
          if-no-files-found: warn
