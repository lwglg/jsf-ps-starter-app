version: '3.9'

services:
  database:
    container_name: companyman-db-dev-ctnr
    image: rsdata/companyman-db-dev:latest
    build:
      context: ../../..
      dockerfile: ./infra/docker/develop/database/Dockerfile
      args:
        - TZ=America/Sao_Paulo
    env_file:
      - ./database/.database.env
    volumes:
      - pgsql-data:/var/lib/pgsql/pgdata
      - '/etc/timezone:/etc/timezone:ro'
      - '/etc/localtime:/etc/localtime:ro'
    ports:
      - "5001:5001"
    networks:
      - default-dev-net
    restart: unless-stopped

  tomcat:
    container_name: companyman-tomcat-dev-ctnr
    image: rsdata/companyman-tomcat-dev:latest
    build:
      context: ../../..
      dockerfile: ./infra/docker/develop/tomcat/Dockerfile
    env_file:
      - ./tomcat/.tomcat.env
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - default-dev-net
    restart: unless-stopped


networks:
  default-dev-net:
    driver: bridge

volumes:
  pgsql-data:
    name: jsf-pf-platform-pgsql-data
