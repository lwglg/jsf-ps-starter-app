# Configuração de log para os testes (slf4j-simple).
# Objetivo: expor os logs de diagnóstico do Testcontainers/docker-java que,
# sem um binding do SLF4J presente, ficam completamente silenciados —
# inclusive as mensagens que explicam por que nenhuma estratégia de conexão
# com o Docker teve sucesso.

org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS

org.slf4j.simpleLogger.log.org.testcontainers=debug
org.slf4j.simpleLogger.log.com.github.dockerjava=debug
org.slf4j.simpleLogger.log.tc=debug
