<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces"
    template="/WEB-INF/template/layout.xhtml">
    <ui:define name="content">
        <h:form id="form">
            <p:growl id="growl" showDetail="true"/>

            <p:toolbar>
                <p:toolbarGroup>
                    <p:commandButton
                        value="Novo Ramo de Atividade"
                        icon="pi pi-plus"
                        actionListener="#{ramoAtividadeBean.prepararNovo()}"
                        oncomplete="PF('dlgNovo').show()"
                        update=":formNovo:dlgNovoContent"/>
                </p:toolbarGroup>
                <p:toolbarGroup align="right">
                    <!-- <span style="margin-right:8px; color:#6b7280;">Exportar:</span>
                    <p:commandButton
                        value="CSV"
                        icon="pi pi-file"
                        ajax="false"
                        actionListener="#{ramoAtividadeBean.exportar('CSV')}"/>
                    <p:commandButton
                        value="XLS"
                        icon="pi pi-file-excel"
                        ajax="false"
                        actionListener="#{ramoAtividadeBean.exportar('XLS')}"/>
                    <p:commandButton
                        value="ODT"
                        icon="pi pi-file-word"
                        ajax="false"
                        actionListener="#{ramoAtividadeBean.exportar('ODT')}"/>
                    <p:commandButton
                        value="PDF"
                        icon="pi pi-file-pdf"
                        ajax="false"
                        actionListener="#{ramoAtividadeBean.exportar('PDF')}"/> -->
                    
                    <!-- Main Button to open the dialog -->
                    <p:commandButton
                        value="Exportar" 
                        icon="pi pi-file-export" 
                        oncomplete="PF('dlgExportarRelatorio').show();" />
                </p:toolbarGroup>
            </p:toolbar>

            <p:dialog
                header="Exportar Relatório" 
                widgetVar="dlgExportarRelatorio" 
                modal="true"
                width="520"
                showEffect="fade"
                responsive="true">
                <h:panelGroup id="dlgExportarRelatorioContent" layout="block">                    
                    <p:outputLabel for="nomeArquivo" value="Nome do arquivo:" />
                    <p:inputText
                        id="nomeArquivo"
                        value="#{ramoAtividadeBean.nomeArquivo}"
                        required="true"
                        requiredMessage="O nome do arquivo é obrigatório."
                        maxlength="80"
                        style="width:100%"/>
                    <p:message id="nomeArquivoMsg" for="nomeArquivo" display="text"/>

                    <p:outputLabel for="formatoExportacaoEdit" value="Formato:"/>
                    <p:selectOneMenu
                        id="formatoExportacaoEdit"
                        value="#{ramoAtividadeBean.formatoSelecionado}"
                        required="true"
                        requiredMessage="O formato de exportação é obrigatório."
                        style="width:100%">                        
                        <f:selectItem
                            itemLabel="Selecione..."
                            itemValue="#{null}"
                            noSelectionOption="true"/>
                        <f:selectItems
                            value="#{ramoAtividadeBean.getFormatosExportacao()}"
                            var="formato"
                            itemLabel="#{formato.getExtensao().toUpperCase()} (#{formato.getContentType()})"
                            itemValue="#{formato}"/>
                    </p:selectOneMenu>
                    <p:message id="formatoExportacaoEditMsg" for="formatoExportacaoEdit" display="text"/>
                
                    <p:commandButton
                        value="Cancelar" 
                        styleClass="ui-button-flat" 
                        onclick="PF('dlgExportarRelatorio').hide();" 
                        type="button" />
                    
                    <p:commandButton
                        value="Exportar"
                        icon="pi pi-check"
                        style="margin-top:15px"
                        actionListener="#{ramoAtividadeBean.exportar()}"
                        oncomplete="if (args &amp;&amp; !args.validationFailed) { PF('dlgExportarRelatorio').hide(); }"
                        update=":form:growl nomeArquivoMsg formatoExportacaoEditMsg"/>
                </h:panelGroup>
            </p:dialog>

            <p:dataTable
                id="tabela"
                var="ramo"
                value="#{ramoAtividadeBean.lista}"
                paginator="true"
                rows="10"
                emptyMessage="Nenhum ramo de atividade cadastrado."
                style="margin-top:15px">
                <p:column headerText="Descrição">
                    <h:outputText value="#{ramo.descricao}"/>
                </p:column>
                <p:column headerText="Ações" style="width:140px; text-align:center">
                    <p:commandButton
                        icon="pi pi-pencil"
                        styleClass="rounded-button"
                        actionListener="#{ramoAtividadeBean.prepararEdicao(ramo)}"
                        oncomplete="PF('dlgEditar').show()"
                        update=":formEditar:dlgEditarContent"/>
                    <p:commandButton
                        icon="pi pi-trash"
                        styleClass="rounded-button ui-button-danger"
                        actionListener="#{ramoAtividadeBean.remover(ramo.id)}"
                        update=":form:tabela :form:growl">
                        <p:confirm
                            header="Confirmação"
                            message="Deseja realmente remover este ramo de atividade?"
                            icon="pi pi-exclamation-triangle"/>
                    </p:commandButton>
                </p:column>
            </p:dataTable>
        </h:form>

        <p:dialog
            header="Novo Ramo de Atividade"
            widgetVar="dlgNovo"
            modal="true"
            width="420"
            showEffect="fade">
            <h:form id="formNovo">
                <h:panelGroup
                    id="dlgNovoContent"
                    layout="block">
                    <p:outputLabel for="descricao" value="Descrição: "/>
                    <p:inputText
                        id="descricao"
                        value="#{ramoAtividadeBean.novoRegistro.descricao}"
                        required="true"
                        requiredMessage="A descrição é obrigatória."
                        maxlength="150"
                        style="width:100%"/>
                    <p:message id="descricaoMsg" for="descricao" display="text"/>

                    <p:commandButton
                        value="Salvar"
                        icon="pi pi-check"
                        style="margin-top:15px"
                        actionListener="#{ramoAtividadeBean.salvar()}"
                        oncomplete="if (args &amp;&amp; !args.validationFailed) { PF('dlgNovo').hide(); }"
                        update=":form:tabela :form:growl descricao descricaoMsg"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

        <p:dialog
            header="Editar Ramo de Atividade"
            widgetVar="dlgEditar"
            modal="true"
            width="420"
            showEffect="fade">
            <h:form id="formEditar">
                <h:panelGroup id="dlgEditarContent" layout="block">
                    <p:outputLabel for="descricaoEdit" value="Descrição *"/>
                    <p:inputText
                        id="descricaoEdit"
                        value="#{ramoAtividadeBean.selecionado.descricao}"
                        required="true"
                        requiredMessage="A descrição é obrigatória."
                        maxlength="150"
                        style="width:100%"/>
                    <p:message id="descricaoEditMsg" for="descricaoEdit" display="text"/>

                    <p:commandButton
                        value="Atualizar"
                        icon="pi pi-check"
                        style="margin-top:15px"
                        actionListener="#{ramoAtividadeBean.atualizar()}"
                        oncomplete="if (args &amp;&amp; !args.validationFailed) { PF('dlgEditar').hide(); }"
                        update=":form:tabela :form:growl descricaoEdit descricaoEditMsg"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

        <p:confirmDialog global="true">
            <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check"/>
            <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times"/>
        </p:confirmDialog>
    </ui:define>
</ui:composition>
