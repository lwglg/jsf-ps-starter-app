<!DOCTYPE html>
<html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:f="jakarta.faces.core"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces">
<h:head>
    <title>#{sobreSistemaBean.nomeSistema}</title>
    <h:outputStylesheet library="css" name="app.css"/>
</h:head>
<h:body>
    <h:form id="menuForm">
        <p:menubar>
            <p:menuitem
                value="Inicial"
                outcome="/index.xhtml"
                icon="pi pi-home"/>
            <p:menuitem
                value="Empresas"
                outcome="/empresa/list.xhtml"
                icon="pi pi-building"/>
            <p:menuitem
                value="Ramos de Atividade"
                outcome="/ramoAtividade/list.xhtml"
                icon="pi pi-sitemap"/>
            <p:menuitem
                value="Sobre o Sistema"
                icon="pi pi-info-circle"
                onclick="PF('dlgSobreSistema').show(); return false;"/>
        </p:menubar>
    </h:form>

    <div class="content-wrapper">
        <ui:insert name="content">Conteúdo</ui:insert>
    </div>

    <!-- Ponto de composição dedicado para dialogs/modais globais, separado do
         conteúdo principal da página (ui:insert name="content"), para que a
         abertura de um modal nunca substitua o que está sendo exibido.
         Por padrão, inclui o modal "Sobre o Sistema"; páginas podem
         sobrescrever com <ui:define name="dialog"> se precisarem de outro
         conjunto de modais. -->
    <ui:insert name="dialog">
        <ui:include src="/dialogs/sobre-sistema/index.xhtml"/>
    </ui:insert>
</h:body>
</html>
